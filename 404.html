<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | AlgoCraftDev</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0d0d15">
    <meta name="color-scheme" content="dark">
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="web-app-manifest-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="web-app-manifest-512x512.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="main.css">

    <!--Styles-->
</head>

<body>
    <!-- FIX 7.4: Added page-loader for consistent load behavior across all pages -->
    <div class="page-loader" id="page-loader" aria-hidden="true">
        <div class="loader-spinner"></div>
    </div>

    <div class="blob-wrapper">
        <div class="drop drop-1">
            <div class="drop-inner"></div>
            <div class="drop-specular"></div>
            <div class="drop-caustic"></div>
        </div>
        <div class="drop drop-2">
            <div class="drop-inner"></div>
            <div class="drop-specular"></div>
            <div class="drop-caustic"></div>
        </div>
        <div class="drop drop-3">
            <div class="drop-inner"></div>
            <div class="drop-specular"></div>
            <div class="drop-caustic"></div>
        </div>
        <div class="drop drop-4">
            <div class="drop-inner"></div>
            <div class="drop-specular"></div>
            <div class="drop-caustic"></div>
        </div>
    </div>

    <header class="custom-nav">
        <a href="index.html" class="logo" aria-label="Go to AlgoCraftDev homepage">AlgoCraftDev</a>
    </header>

    <main class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">
            The page you're looking for doesn't exist or has been moved. Let's get you back on track.
        </p>
        <!-- FIX 7.3: Auto-redirect countdown -->
        <p class="error-redirect-note" id="redirect-note">Redirecting to home in <strong id="redirect-count">10</strong>s…</p>
        <a href="index.html" class="error-btn" id="error-home-btn">
            Back to Home
        </a>
    </main>
    <script>
        (function() {
            var count = 10;
            var el = document.getElementById('redirect-count');
            var interval = setInterval(function() {
                count--;
                if (el) el.textContent = count;
                if (count <= 0) {
                    clearInterval(interval);
                    window.location.replace('index.html');
                }
            }, 1000);
            // Manual button cancels auto-redirect
            var btn = document.getElementById('error-home-btn');
            if (btn) btn.addEventListener('click', function() { clearInterval(interval); });
        })();
    </script>
    <script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js" crossorigin="anonymous" defer></script>
    <script src="main.js" defer></script>
</body>

</html>
